<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media-query.css">
    <title>Dashboard</title>
</head>
<body>
    <aside>
        <p class="person">
            <span class="material-symbols-outlined icone">person</span>
            <span class="texto-menu">Luana</span> 
        </p>
        <p class="opcoes">Dashboard</p>
        <p class="opcoes">Relatórios</p>
        <p class="opcoes">Configurações</p>
        <p id="toggle-theme" class="opcoes"><span class="material-symbols-outlined icone">dark_mode</span></p>
    </aside>
    <main>
        <h1 class="title">Dashboard Financeiro</h1>
        <div class="topbar">
            <div>
                <h1>Olá, Lua 👋</h1>
                <p id="data-atual"></p>
            </div>
        </div>
        <section class="cards">
            <div class="card saldo"><p>Saldo: <h2>R$ 130.000,00</h2></p></div>
            <div class="card receitas"><p>Receitas: <h2>R$ 15.580,00</h2></p></div>
            <div class="card despesas"><p>Despesas: <h2>R$ 9.350,00</h2></p></div>
        </section>
        <canvas id="grafico" height="100"></canvas>
        <section class="tabela">
            <table>
                <tr>
                    <th>Data</th>
                    <td>05/05</td>
                    <td>07/05</td>
                    <td>07/05</td>
                </tr>
                <tr>
                    <th>Descrição</th>
                    <td>Salário</td>
                    <td>Mercado</td>
                    <td>Internet</td>
                </tr>
                <tr>
                    <th>Valor</th>
                    <td>R$ 17.500,00</td>
                    <td>- R$ 1.500,00</td>
                    <td>- R$ 150,00</td>
                </tr>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
