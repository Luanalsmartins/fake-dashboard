<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Dashboard</title>
</head>
<body>
    <aside>
        <div class="dashboard">Dashboard</div>
        <div class="relatorios">Relatórios</div>
        <div class="config">Configurações</div>
        <button id="toggle-theme">Dark Mode</button>
    </aside>
    <main>
        <h1>Dashboard Financeiro</h1>
        <section class="cards">
            <div class="card saldo"><h3>Saldo: R$ 130.000,00</h3></div>
            <div class="card receitas"><h3>Receitas: R$ 15.580,00</h3></div>
            <div class="card despesas"><h3>Despesas: R$ 9.350,00</h3></div>
        </section>
        <section class="tabela">
            <table>
                <tr>
                    <th>Data</th>
                    <td>05/05</td>
                    <td>07/05</td>
                    <td>07/05</td>
                </tr>
                <tr>
                    <th>Descrição</th>
                    <td>Salário</td>
                    <td>Mercado</td>
                    <td>Internet</td>
                </tr>
                <tr>
                    <th>Valor</th>
                    <td>R$ 17.500,00</td>
                    <td>- R$ 1.500,00</td>
                    <td>- R$ 150,00</td>
                </tr>
            </table>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
